# gateway.yaml — 容器内启动配置
#
# host 替换：
#   mysql → mysql、redis → redis、kafka → redpanda:9092
#   mockupstream 通过 compose service 名互连
#
# usage_events 走 file_and_kafka：file 落 /tmp/llm-gateway-usage.jsonl（卷挂出，e2e
# 用于校验事件落地），Kafka 投递给 billing.usage.recorded.v1 让 Flink 消费。

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 30s

database:
  driver: mysql
  dsn: "root:@tcp(mysql:3306)/llm_gateway?parseTime=true&charset=utf8mb4"

redis:
  addr: "redis:6379"
  db: 0
  password: ""

data_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

request:
  body_limit_bytes: 10485760
  timeout: 60s

budget:
  driver: alwayspass
  default_balance: 0

moderation:
  driver: none

selector:
  filters: [cooldown, limit_read, weighted_random]
  cooldown:
    transient: 30s
    capacity:  60s
    permanent: 5m
    invalid:   0s
    unknown:   10s
  max_attempts: 3

usage_events:
  driver: file_and_kafka
  file:
    path: /var/lib/llm-gateway/usage.jsonl
  kafka:
    brokers: ["redpanda:9092"]
    topic: billing.usage.recorded.v1
    async: true
    buffer_size: 1024
    max_retries: 3
    dlq_topic: billing.usage.recorded.v1.dlq

content_log:
  driver: file
  sample_rate: 1.0
  buffer_size: 1024
  backpressure: drop_oldest
  file:
    path: /var/lib/llm-gateway/content.jsonl
