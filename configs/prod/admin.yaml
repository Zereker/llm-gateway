# admin.yaml — production 模板
#
# **部署假设**：admin 服务只暴露内网/loopback；reverse proxy 不要把 :8081 转出去。
# X-Admin-Token 是次要保险，主防线是网络隔离。
#
# 部署步骤：
#   1. 把本 yaml 拷到目标机：/etc/ai-gateway/admin.yaml
#   2. token 从 secret 注入（k8s Secret / Vault / sops）；**不要 commit 真实 token**
#   3. 启动 admin（独立 systemd unit / container；与 gateway 同机或独立部署都行）

server:
  addr: "127.0.0.1:8081"   # 只监听 loopback；与 gateway 同机时强制内网调用
  read_header_timeout: 10s
  shutdown_timeout: 60s

admin:
  token: REPLACE_FROM_SECRET

database:
  # 与 gateway 的 prod yaml 一致；admin 启动时 Migrate 建表 + 后续 schema 演进。
  driver: postgres
  dsn: postgres://ai_gateway:CHANGE_ME@db:5432/ai_gateway?sslmode=disable
