# gateway.yaml — production 模板
#
# **不要把真实密钥提交到 git**：所有业务记录（model_services / endpoints /
# api_keys）由 admin 进程通过 HTTP CRUD 维护，存 DB；本目录只持有 yaml + README。
#
# 部署：
#   1. 把本 yaml 拷到目标机：/etc/ai-gateway/gateway.yaml
#   2. 启动 admin（cmd/admin）建表 + 录入 model_services / endpoints / api_keys
#   3. 启动 gateway：ai-gateway -config /etc/ai-gateway/gateway.yaml

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 60s         # 生产留更长 drain 时间给长连接

middleware:
  body_limit_bytes: 5242880     # 5 MiB（生产保守）
  timeout: 90s                  # 长 LLM 响应留余量

database:
  # 生产 MySQL；用户名密码从 secret 注入（环境变量 / k8s Secret 渲染）。
  driver: mysql
  dsn: "ai_gateway:CHANGE_ME@tcp(db:3306)/ai_gateway?parseTime=true&charset=utf8mb4&tls=preferred"

outbox:
  # 生产建议 kafka：usage 事件流入下游计费 / 审计 / 监控管道。
  driver: kafka
  kafka:
    brokers: ["broker1:9092", "broker2:9092", "broker3:9092"]
    topic: ai-gateway.usage
  # 想本地起步也可用 file：
  # driver: file
  # file:
  #   path: /var/log/ai-gateway/usage.log
