# Debezium Server 配置（独立 standalone 模式，不依赖 Kafka Connect）。
#
# Source: MySQL binlog (llm_gateway 库)
# Sink:   Redis Streams（每张表一个 stream key）
#
# Stream key 命名规则：<topic.prefix>.<schema>.<table>
# 例如：llm_gateway.llm_gateway.model_services
#
# 每条消息是 JSON 形态的 Debezium envelope：
#   {
#     "schema": {...},
#     "payload": {
#       "before": {...} | null,        // 旧行（DELETE/UPDATE 有）
#       "after":  {...} | null,        // 新行（INSERT/UPDATE 有）
#       "source": {"db":"llm_gateway","table":"model_services","ts_ms":...},
#       "op":     "c"|"u"|"d"|"r",     // create / update / delete / read(snapshot)
#       "ts_ms":  ...
#     }
#   }

# =============================================================================
# Sink: Redis Streams
# =============================================================================
debezium.sink.type=redis
debezium.sink.redis.address=redis:6379
debezium.sink.redis.batch.size=100
debezium.sink.redis.retry.initial.delay.ms=300
debezium.sink.redis.retry.max.delay.ms=10000

# =============================================================================
# Source: MySQL connector
# =============================================================================
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector

# MySQL 连接
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=debezium
debezium.source.database.password=debezium-pass
debezium.source.database.server.id=85744
debezium.source.database.include.list=llm_gateway

# 表过滤（含所有 admin 维护的实体）
debezium.source.table.include.list=llm_gateway.model_services,llm_gateway.endpoints,llm_gateway.account_model_subscriptions,llm_gateway.api_keys,llm_gateway.quota_policies,llm_gateway.accounts

# Topic 前缀：Redis stream key 的第一段
debezium.source.topic.prefix=llm_gateway

# Snapshot 行为：首次启动全量读（initial），之后 binlog 增量
debezium.source.snapshot.mode=initial

# Schema history (Debezium 自己持久化 DDL 历史；用文件存储)
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat

# Offset 持久化（binlog 位点，断点续传必需）
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=10000

# 跳过 schema 列（不通过 envelope 传 schema，减小消息体）
debezium.source.key.converter.schemas.enable=false
debezium.source.value.converter.schemas.enable=false
debezium.source.key.converter=org.apache.kafka.connect.json.JsonConverter
debezium.source.value.converter=org.apache.kafka.connect.json.JsonConverter

# =============================================================================
# Quarkus runtime tuning (Debezium Server 内部跑 Quarkus)
# =============================================================================
quarkus.log.level=INFO
quarkus.log.console.json=false
