# gateway.yaml — ai-gateway 本地启动配置
#
# 所有字段都可省略；省略时取 pkg/config.ApplyDefaults 中的默认值。
# 运行：
#   go run ./cmd/gateway -config ./configs/local/gateway.yaml

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 30s

middleware:
  body_limit_bytes: 10485760  # 10 MiB
  timeout: 60s

paths:
  # map[apiKey]UserIdentity 的 JSON 文件（仍然 file-based；Stage 4+ 可考虑迁 DB）
  apikeys: apikeys.json
  # pkg/usage.FileOutbox 写入路径（计量事件 JSONL）
  usage_log: /tmp/ai-gateway-usage.log

database:
  # ModelService / Endpoint 的存储；admin 增删改、gateway 启动期 Migrate + 读。
  # sqlite 文件路径相对本 yaml 所在目录解析（→ configs/local/gateway.db）。
  driver: sqlite
  dsn: gateway.db
