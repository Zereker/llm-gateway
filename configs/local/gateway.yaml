# gateway.yaml — llm-gateway 本地启动配置
#
# 所有字段都可省略；省略时取 pkg/config.ApplyDefaults 中的默认值。
# 运行：
#   go run ./cmd/gateway -config ./configs/local/gateway.yaml
#
# 前置：起本地 stack（mysql + redis + redpanda）：
#   docker compose up -d

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 30s

database:
  # ModelService / Endpoint / APIKey 的存储；gateway 启动跑 infra.Migrate 建表 + CheckSchema 防御性校验；业务数据 SQL 直接维护。
  # docker-compose 起的 MySQL：root 无密码、库名 llm_gateway
  driver: mysql
  dsn: "root:@tcp(localhost:3306)/llm_gateway?parseTime=true&charset=utf8mb4"

redis:
  # M6 RateLimit 限流计数 + 未来 hot-path cache 共享 Redis。
  # gateway 启动期 ping fail-fast，配错立即可见。
  # 生产配主备 / sentinel；本地 docker-compose 起的单实例。
  addr: "localhost:6379"
  db: 0
  password: ""

# data_key: AES-256-GCM 加密 endpoints.auth 列的 KEK（hex-encoded 32 字节）。
# deployer 用 SQL 写 endpoints.auth 时必须用同一个 KEK；生产从 secret manager 注入。
# 本地 dev 用一个固定值方便调试；**绝不能上生产**。
data_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

request:
  # per-request HTTP 默认限制（历史上叫 middleware:，实际跟 M1-M10 链无关；详见 pkg/config RequestConfig 文档）
  body_limit_bytes: 10485760  # 10 MiB；M1 之前 router 层就拒掉
  timeout: 60s                # gin TimeoutMiddleware 包整条 M1-M10 链的全局兜底

budget:
  # M4 Budget Gate driver：
  #   alwayspass — 默认；永远放行（开发 / 无付费体系）
  #   inmemory   — 进程内余额跟踪（demo / 单主账号；丢内存重启清零）
  driver: alwayspass
  # inmemory 时新 user 首次出现给的初始余额（USD）。0 = safe-by-default 拒绝
  default_balance: 0

moderation:
  # M8 Content Moderation driver：
  #   none   — 默认；不审核（pass-through）
  #   openai — 调 OpenAI /v1/moderations endpoint
  driver: none
  # openai 时必填；生产从 secret manager 注入
  # api_key: ""
  # base_url 留空走 OpenAI 官方
  # base_url: ""

selector:
  # M7 端点选路 Filter chain（顺序就是执行顺序；weighted_random 必须放最后）
  filters: [cooldown, limit_read, weighted_random]

  # endpoint 失败后冷却时长（按 ErrorClass 分；0 = 不冷却）
  cooldown:
    transient: 30s     # 上游 5xx / 网络错 / timeout
    capacity:  60s     # 上游 429 / overloaded
    permanent: 5m      # 上游 401 / 配置错
    invalid:   0s      # 客户端 400-class，不该冷却 endpoint
    unknown:   10s     # 分类不出来时

  # 全局尝试上限；客户端 X-Gateway-Max-Attempts 可覆盖（只能更小）
  max_attempts: 3

  # 会话亲和（sticky routing）：客户端 X-Gateway-Session 头带 session id，网关把该
  # session 粘到同一上游 endpoint（prefix/KV cache 命中）。软亲和——pinned endpoint
  # 被 cooldown/排除时自动重选。Redis-backed（多副本共享）。
  session_affinity:
    enabled: false
    ttl: 10m

cache:
  # 响应缓存（M6 之后、M7 之前）：命中直接返回、跳过上游，省钱降延迟。Redis-backed。
  # 默认只缓存非流式 + temperature=0 的确定性请求；客户端 X-Gateway-Cache: on/off 覆盖。
  enabled: false
  ttl: 5m

scoring:
  # Runtime Scoring（按 endpoint 运行时质量 soft 调权）；默认关。见 docs/03 §8。
  enabled: false
  driver: inmemory        # inmemory=每副本独立 | redis=多副本共享（生产多副本用）
  min_samples: 5
  latency_baseline: 200ms
  ema_decay: 0.2
  stats_ttl: 1h           # 仅 redis driver

usage_events:
  # Transactional Outbox Pattern：file 是 source of truth（sync commit），
  # Kafka 是 best-effort 异步广播。broker 挂了仍能 commit；外部 replay 工具
  # 读 file 把缺的事件补发到 Kafka（详见 docs/05 §5）。
  # topic 按"领域.实体.事件.版本"命名，跟生产者服务名解耦。
  driver: file_and_kafka
  file:
    path: /tmp/llm-gateway-usage.jsonl   # source of truth；外部 logrotate 管轮转
  kafka:
    brokers: ["localhost:9092"]
    topic: billing.usage.recorded.v1
    async: true
    buffer_size: 1024
    max_retries: 3
    # dlq_topic 可选：file 已是真理，DLQ 只用于单消息级问题（msg too large / schema invalid）
    dlq_topic: billing.usage.recorded.v1.dlq

content_log:
  # 内容记录通道（docs/05 §2 + docs/08 §6）。
  # gateway 只写本地 JSONL；下游分流（S3 归档 / Loki 检索 / Kafka 内容安全后审 /
  # 训练数据回流）交给 fluent-bit / vector 这类日志收集器，gateway 不内嵌 Kafka producer。
  # 文件本身的轮转 / 压缩 / 清理由外部 logrotate 或日志收集器负责。
  driver: file
  sample_rate: 1.0       # e2e 测试全采；生产按 account / 模型 / 错误状态降采样
  buffer_size: 1024
  backpressure: drop_oldest
  file:
    path: /tmp/llm-gateway-content.jsonl
