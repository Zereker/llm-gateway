# gateway.yaml — ai-gateway 本地启动配置
#
# 所有字段都可省略；省略时取 pkg/config.ApplyDefaults 中的默认值。
# 运行：
#   go run ./cmd/gateway -config ./configs/local/gateway.yaml
#
# 前置：起本地 stack（mysql + redis + redpanda）：
#   docker compose up -d

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 30s

middleware:
  body_limit_bytes: 10485760  # 10 MiB
  timeout: 60s

database:
  # ModelService / Endpoint 的存储；admin 增删改、gateway 启动期 CheckSchema + 读。
  # docker-compose 起的 MySQL：root 无密码、库名 ai_gateway
  driver: mysql
  dsn: "root:@tcp(localhost:3306)/ai_gateway?parseTime=true&charset=utf8mb4"

outbox:
  # M10 Tracing 输出 usage 事件去哪：file 或 kafka。
  # 本地默认 file（JSONL 追加），生产建议 kafka。
  driver: file
  file:
    path: /tmp/ai-gateway-usage.log
  # kafka:
  #   brokers: ["localhost:9092"]
  #   topic: ai-gateway.usage
