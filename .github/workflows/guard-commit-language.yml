name: Guard commit language

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "$base" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$base" 2>/dev/null; then
              base="$(git rev-parse --verify -q HEAD~1 2>/dev/null || echo "$head")"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Reject non-English commit messages
        run: |
          base="${{ steps.range.outputs.base }}"
          head="${{ steps.range.outputs.head }}"
          has_cjk() {
            python3 -c 'import sys; msg = sys.stdin.read(); sys.exit(0 if any(chr(0x4e00) <= ch <= chr(0x9fff) or chr(0x3000) <= ch <= chr(0x303f) or chr(0xff00) <= ch <= chr(0xffef) for ch in msg) else 1)'
          }
          fail=0
          for sha in $(git log --format='%H' "$base..$head"); do
            msg="$(git log -1 --format=%B "$sha")"
            if printf '%s' "$msg" | has_cjk; then
              echo "::error::Commit $sha has a non-English commit message (git commits must be written in English):"
              printf '%s\n' "$msg" | sed 's/^/  | /'
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "no CJK text found in commit messages in range"

      - name: Reject non-English PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          has_cjk() {
            python3 -c 'import sys; msg = sys.stdin.read(); sys.exit(0 if any(chr(0x4e00) <= ch <= chr(0x9fff) or chr(0x3000) <= ch <= chr(0x303f) or chr(0xff00) <= ch <= chr(0xffef) for ch in msg) else 1)'
          }
          if printf '%s' "$PR_TITLE" | has_cjk; then
            echo "::error::PR title must be written in English: $PR_TITLE"
            exit 1
          fi
          echo "PR title is English-only"
