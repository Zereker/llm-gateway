# gateway.yaml — production template
#
# **Do not commit real secrets to git**: all business records (model_services /
# endpoints / api_keys) are maintained directly via SQL by the deployer; this
# directory only holds the yaml + README.
#
# Deployment:
#   1. Copy this yaml to the target machine: /etc/llm-gateway/gateway.yaml
#   2. Start gateway; it applies schema migrations before becoming ready.
#   3. Manage business data via SQL or cmd/console.

server:
  addr: ":8080"
  read_header_timeout: 10s
  shutdown_timeout: 60s         # leave more drain time in prod for long-lived connections

request:
  # per-request HTTP defaults (router-level body rejection before M1 + the global timeout wrapping the whole M1-M10 chain)
  body_limit_bytes: 5242880     # 5 MiB (conservative for prod)
  timeout: 90s                  # extra headroom for long LLM responses

database:
  # Production MySQL; username/password are injected from secrets (env vars / k8s Secret rendering).
  driver: mysql
  dsn: "llm_gateway:CHANGE_ME@tcp(db:3306)/llm_gateway?parseTime=true&charset=utf8mb4&tls=preferred"

usage_events:
  # Synchronous Kafka acknowledges the event before Publish returns. Set async
  # to true only when best-effort in-memory buffering is an acceptable tradeoff.
  driver: kafka
  kafka:
    brokers: ["broker1:9092", "broker2:9092", "broker3:9092"]
    # Name topics as "domain.entity.event.version", decoupled from the producer service name.
    topic: billing.usage.recorded.v1
    async: false
    dlq_topic: billing.usage.recorded.v1.dlq
  # Local file mode is an independent sink, not a transactional Kafka outbox:
  # driver: file
  # file:
  #   path: /var/log/llm-gateway/usage.log
