{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-secrets
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-dsn: {{ required "secrets.databaseDSN is required when secrets.existingSecret is empty" .Values.secrets.databaseDSN | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  redis-addr: {{ .Values.secrets.redisAddr | quote }}
  data-key: {{ required "secrets.dataKey is required when secrets.existingSecret is empty" .Values.secrets.dataKey | quote }}
  moderation-api-key: {{ .Values.secrets.moderationApiKey | quote }}
{{- end }}
