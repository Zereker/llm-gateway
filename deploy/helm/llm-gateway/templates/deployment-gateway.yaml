{{- $usageDriver := .Values.gateway.config.usage_events.driver }}
{{- $fileUsage := or (eq $usageDriver "file") (eq $usageDriver "file_and_kafka") }}
{{- if and $fileUsage (not .Values.gateway.usagePersistence.enabled) (not .Values.gateway.usagePersistence.existingClaim) }}
{{- fail "gateway.usagePersistence.enabled or existingClaim is required for file-based usage_events drivers" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-gateway.fullname" . }}-gateway
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  {{- if not .Values.gateway.autoscaling.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "llm-gateway.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-gateway.gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # rolling restart on configmap/secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap-gateway.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "llm-gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args: ["-config", "/etc/llm-gateway/gateway.yaml"]
          env:
            - name: LLM_GATEWAY_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.secretName" . }}
                  key: database-dsn
            - name: LLM_GATEWAY_REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.secretName" . }}
                  key: redis-addr
            - name: LLM_GATEWAY_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.secretName" . }}
                  key: redis-password
            - name: LLM_GATEWAY_DATA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.secretName" . }}
                  key: data-key
            {{- if eq .Values.gateway.config.moderation.driver "openai" }}
            - name: LLM_GATEWAY_MODERATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.secretName" . }}
                  key: moderation-api-key
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.gateway.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.gateway.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llm-gateway/gateway.yaml
              subPath: gateway.yaml
            {{- if $fileUsage }}
            - name: usage
              mountPath: /var/log/llm-gateway
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "llm-gateway.fullname" . }}-gateway
        {{- if $fileUsage }}
        - name: usage
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-usage" (include "llm-gateway.fullname" .)) .Values.gateway.usagePersistence.existingClaim }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
