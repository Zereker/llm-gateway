apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-gateway.fullname" . }}-gateway
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  {{- if not .Values.gateway.autoscaling.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "llm-gateway.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-gateway.gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # rolling restart on configmap/secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap-gateway.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args: ["-config", "/etc/llm-gateway/gateway.yaml"]
          env:
            - name: LLM_GATEWAY_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: database-dsn
            - name: LLM_GATEWAY_REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: redis-addr
            - name: LLM_GATEWAY_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: redis-password
            - name: LLM_GATEWAY_DATA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: data-key
            {{- if eq .Values.gateway.config.moderation.driver "openai" }}
            - name: LLM_GATEWAY_MODERATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: moderation-api-key
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.gateway.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.gateway.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llm-gateway/gateway.yaml
              subPath: gateway.yaml
            - name: usage
              mountPath: /var/log/llm-gateway
      volumes:
        - name: config
          configMap:
            name: {{ include "llm-gateway.fullname" . }}-gateway
        - name: usage
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
