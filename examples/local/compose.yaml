# Local dev stack -- contains only the underlying infra needed to run the gateway:
#   - mysql       business data (model_services / endpoints / api_keys / pricing, etc.)
#   - redis       ratelimit bucket store + scheduler cooldown state
#   - redpanda    usage event Kafka delivery (billing.usage.recorded.v1)
#
# Command cheat sheet:
#   docker compose up -d        # bring up the stack
#   docker compose down -v      # tear down everything (volumes included)
#
# Upper-level processes (gateway / mockupstream) run on the host:
#   make run-gateway       # runs infra.Migrate at startup to create tables
#   make run-mockupstream  # mock upstream for debugging (see examples/support/mockupstream)
#
# Port mapping (host -> container):
#   3306  -> mysql
#   6379  -> redis
#   9092  -> redpanda kafka
#
# **Data freshness**: the repo layer uses a TTL cache (default 30s); after the deployer
# updates business tables via SQL (endpoints / api_keys / quota_policies, etc.), the
# gateway picks up the new values within ~30s.

services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: llm_gateway
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Dual listeners: host processes (gateway / tests) reach the broker via
      # localhost:9092; in-network containers (redpanda-init) use redpanda:29092.
      # A single advertised addr would break one side or the other -- the broker
      # redirects clients to the advertised name after bootstrap.
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-init:
    # one-shot: pre-creates the topic used for billing (the gateway outbox's delivery target)
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk -X brokers=redpanda:29092 topic create billing.usage.recorded.v1 -p 1 -r 1 || true
        rpk -X brokers=redpanda:29092 topic create billing.usage.recorded.v1.dlq -p 1 -r 1 || true
        echo "topics ready"
    restart: "no"

volumes:
  mysql-data:
  redis-data:
  redpanda-data:
