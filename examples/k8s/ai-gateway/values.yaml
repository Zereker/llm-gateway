# values.yaml — ai-gateway Helm chart 默认值
#
# 部署模式：gateway 多副本 + admin 单副本 + 共享 MySQL + Redis（外部依赖）。
# 不内置 MySQL / Redis / Kafka——生产应该用 cloud managed（RDS / ElastiCache /
# MSK）或独立 Helm chart 部署，避免本 chart 关心 stateful infra。

image:
  repository: ghcr.io/zereker-labs/ai-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

# Gateway 数据平面
gateway:
  replicaCount: 3

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  service:
    type: ClusterIP
    port: 8080

  # HPA 按 CPU 扩缩；流式 chat 长连占 CPU 不高但占 goroutine，可加 custom metric
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

  # 健康探针：/healthz pod 启动后立即可用；/readyz 依赖 db/redis ping
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

  # gateway.yaml 通过 ConfigMap 注入到 /etc/ai-gateway/gateway.yaml
  config:
    server:
      addr: ":8080"
      read_header_timeout: 10s
      shutdown_timeout: 30s
    middleware:
      body_limit_bytes: 10485760
      timeout: 120s
    # database / redis 从 secret 注入（DSN 含密码）
    outbox:
      driver: kafka  # 生产推荐
      kafka:
        brokers: ["kafka:9092"]
        topic: ai-gateway.usage
    scheduler:
      filters: [cooldown, limit_read, weighted_random]
      max_attempts: 3
      max_per_endpoint: 2
      cooldown:
        transient: 30s
        capacity:  60s
        permanent: 5m
        invalid:   0s
        unknown:   10s
    budget:
      driver: alwayspass  # 生产接计费系统时改 inmemory / redis-backed
    moderation:
      driver: none        # 启用走 openai；api_key 从 secret 注入
    trace:
      driver: otel
      endpoint: otel-collector:4317
      service_name: ai-gateway

# Admin 控制平面
admin:
  enabled: true
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8081

  # admin 通常只在内网走，不暴露 ingress
  config:
    server:
      addr: ":8081"
      read_header_timeout: 10s

# Ingress（gateway 数据面）
ingress:
  enabled: false  # 默认 off；生产按需开启
  className: nginx
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: ai-gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ai-gateway-tls
    #   hosts: [ai-gateway.example.com]

# Secret 字段 — 部署前必须提供值（用 --set 或单独 secret yaml 覆盖）
# **不要把真值 commit 进本文件**
secrets:
  # MySQL DSN：root:pwd@tcp(mysql:3306)/ai_gateway?...
  databaseDSN: "root:CHANGEME@tcp(mysql:3306)/ai_gateway?parseTime=true&charset=utf8mb4"
  # Redis password（空 = 无密码）
  redisPassword: ""
  redisAddr: "redis:6379"
  # AES-256-GCM KEK，hex 32 字节
  dataKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  # admin token（X-Admin-Token header）
  adminToken: "CHANGEME-admin-token"
  # OpenAI moderation key（moderation.driver=openai 时需要）
  moderationApiKey: ""

# Pod 安全 / scheduling
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}
