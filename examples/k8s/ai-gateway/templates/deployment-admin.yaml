{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-gateway.fullname" . }}-admin
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-gateway.admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-gateway.admin.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-admin.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              envsubst < /etc/ai-gateway/admin.yaml.tmpl > /tmp/admin.yaml && \
              exec /usr/local/bin/ai-gateway-admin -config /tmp/admin.yaml
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: database-dsn
            - name: DATA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: data-key
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-gateway.fullname" . }}-secrets
                  key: admin-token
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ai-gateway/admin.yaml.tmpl
              subPath: admin.yaml
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "ai-gateway.fullname" . }}-admin
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-gateway.fullname" . }}-admin
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - port: {{ .Values.admin.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-gateway.admin.selectorLabels" . | nindent 4 }}
{{- end }}
