apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-gateway.fullname" . }}-secrets
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-dsn: {{ .Values.secrets.databaseDSN | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  redis-addr: {{ .Values.secrets.redisAddr | quote }}
  data-key: {{ .Values.secrets.dataKey | quote }}
  admin-token: {{ .Values.secrets.adminToken | quote }}
  moderation-api-key: {{ .Values.secrets.moderationApiKey | quote }}
