apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gateway.fullname" . }}-gateway
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-gateway.gateway.selectorLabels" . | nindent 4 }}
