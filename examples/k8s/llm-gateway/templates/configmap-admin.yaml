{{- if .Values.admin.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gateway.fullname" . }}-admin
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
data:
  admin.yaml: |
    server:
      addr: {{ .Values.admin.config.server.addr | quote }}
      read_header_timeout: {{ .Values.admin.config.server.read_header_timeout }}
    admin:
      token: "${ADMIN_TOKEN}"
    database:
      driver: mysql
      dsn: "${DATABASE_DSN}"
    data_key: "${DATA_KEY}"
{{- end }}
