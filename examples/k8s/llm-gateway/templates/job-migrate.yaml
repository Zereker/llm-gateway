{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrate-%d" (include "llm-gateway.fullname" .) .Release.Revision | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    # Run schema migration BEFORE the gateway Deployment is applied. Without
    # this the Job and the Deployment apply concurrently, so gateway pods can
    # start against an unmigrated DB, fail CheckMigrationVersion, and
    # CrashLoopBackOff until the Job happens to finish. The hook makes Helm
    # wait for this Job to complete before rolling out the gateway.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "llm-gateway.gateway.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/migrate"]
          args: ["-config", "/etc/llm-gateway/gateway.yaml"]
          env:
            - name: LLM_GATEWAY_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-gateway.fullname" . }}-secrets
                  key: database-dsn
          volumeMounts:
            - name: config
              mountPath: /etc/llm-gateway/gateway.yaml
              subPath: gateway.yaml
      volumes:
        - name: config
          configMap:
            name: {{ include "llm-gateway.fullname" . }}-gateway
{{- end }}
