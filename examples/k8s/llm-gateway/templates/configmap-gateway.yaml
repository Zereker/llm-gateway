apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gateway.fullname" . }}-gateway
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
data:
  gateway.yaml: |
    {{- $cfg := .Values.gateway.config }}
    server:
      addr: {{ $cfg.server.addr | quote }}
      read_header_timeout: {{ $cfg.server.read_header_timeout }}
      shutdown_timeout: {{ $cfg.server.shutdown_timeout }}
    request:
      body_limit_bytes: {{ $cfg.request.body_limit_bytes }}
      timeout: {{ $cfg.request.timeout }}
    # database / redis / data_key 通过 env var 从 secret 注入；这里写占位让 yaml 合法
    database:
      driver: mysql
      dsn: "${DATABASE_DSN}"
    redis:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"
      db: 0
    data_key: "${DATA_KEY}"
    usage_events:
      driver: {{ $cfg.usage_events.driver | quote }}
      {{- if or (eq $cfg.usage_events.driver "file") (eq $cfg.usage_events.driver "file_and_kafka") }}
      file:
        path: {{ $cfg.usage_events.file.path | quote }}
      {{- end }}
      {{- if or (eq $cfg.usage_events.driver "kafka") (eq $cfg.usage_events.driver "async_kafka") (eq $cfg.usage_events.driver "file_and_kafka") }}
      kafka:
        brokers: {{ $cfg.usage_events.kafka.brokers | toJson }}
        topic: {{ $cfg.usage_events.kafka.topic | quote }}
        {{- if $cfg.usage_events.kafka.async }}
        async: true
        {{- end }}
        {{- if $cfg.usage_events.kafka.dlq_topic }}
        dlq_topic: {{ $cfg.usage_events.kafka.dlq_topic | quote }}
        {{- end }}
      {{- end }}
    scheduler:
      filters: {{ $cfg.scheduler.filters | toJson }}
      max_attempts: {{ $cfg.scheduler.max_attempts }}
      cooldown:
        transient: {{ $cfg.scheduler.cooldown.transient }}
        capacity: {{ $cfg.scheduler.cooldown.capacity }}
        permanent: {{ $cfg.scheduler.cooldown.permanent }}
        invalid: {{ $cfg.scheduler.cooldown.invalid }}
        unknown: {{ $cfg.scheduler.cooldown.unknown }}
    budget:
      driver: {{ $cfg.budget.driver | quote }}
    moderation:
      driver: {{ $cfg.moderation.driver | quote }}
      {{- if eq $cfg.moderation.driver "openai" }}
      api_key: "${MODERATION_API_KEY}"
      {{- end }}
    trace:
      driver: {{ $cfg.trace.driver | quote }}
      {{- if eq $cfg.trace.driver "otel" }}
      endpoint: {{ $cfg.trace.endpoint | quote }}
      service_name: {{ $cfg.trace.service_name | quote }}
      {{- end }}
