# golangci-lint v2 configuration (verified against the pinned version in
# .github/workflows/ci.yml — keep the two in sync when upgrading).
#
# Linter selection philosophy: default: none + an explicit enable list, so an
# upgrade adding new linters never breaks CI silently; every linter here is
# either a correctness check or a style rule this codebase actually follows.
version: "2"

linters:
  default: none
  enable:
    # correctness (the non-negotiables)
    - errcheck      # unchecked errors
    - govet         # go vet, same as CI ran before
    - staticcheck   # SA* bug patterns + ST* style + S* simplifications
    - ineffassign   # assignments never read
    - unused        # unused symbols
    - bodyclose     # http.Response.Body leaks
    - rowserrcheck  # sql.Rows.Err() never checked
    - sqlclosecheck # sql.Rows/Stmt leaks
    - errorlint     # ==/!= on errors instead of errors.Is/As, %v vs %w
    - copyloopvar   # pre-go1.22-style loop-var copies that are now redundant
    - nilerr        # returns nil error right after checking err != nil
    # style/hygiene (kept to rules the existing code already passes)
    - misspell
    - unconvert     # redundant type conversions
    - wastedassign
    - whitespace    # trailing/leading blank lines in blocks
    - nolintlint    # malformed or unexplained //nolint directives
    - gocritic      # opinionated but high-signal checks (diagnostic+style defaults)
    # not enabled: goconst — this codebase is protocol-translation code, where
    # repeated string literals ("tool_calls", "assistant", "type", ...) ARE
    # the wire format being spoken; extracting them into constants adds
    # indirection without adding meaning. Verified against a real run: 49/49
    # findings were JSON field names or protocol enum values.
    # not enabled: contextcheck — its findings here are all deliberate
    # detached-context patterns (async fire-and-forget reporting, shutdown
    # paths), which is exactly the case the linter can't distinguish.
    - revive        # golint successor; config below trims its noisiest rules
    - wsl_v5        # whitespace/cuddling rules (the "wsl" ruleset, v5 engine)

  settings:
    # errcheck note: single-value type assertions (sync.Pool.Get().(*T)) are
    # idiomatic here and panic loudly on their own, so check-type-assertions
    # stays off. Intentional error discards use the `_ = x.Close()` form.
    gocritic:
      disabled-checks:
        - ifElseChain # matches this codebase's explicit if/else protocol-branching style
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: errorf
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        # not enabled: exported (comment-format nitpicks on a codebase with
        # rich doc comments), var-naming (would rename Id->ID etc. across the
        # DB-mapped structs), package-comments (covered better by humans).
    wsl_v5:
      # The full wsl ruleset is aggressive on an existing codebase; these two
      # allowances keep the spirit (visual grouping) without rewriting every
      # early-return sequence the repo already uses deliberately.
      allow-first-in-block: true
      allow-whole-block: true

  exclusions:
    # Generated-file and well-known-noise presets maintained by golangci-lint.
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      # Tests legitimately repeat literals, build long fixtures, and ignore
      # errors on cleanup paths.
      - path: _test\.go
        linters:
          - gocritic
          - wsl_v5
      # Scripts are one-shot operator tools: log.Fatalf flow is idiomatic
      # there, so gocritic's exitAfterDefer (a leaked DB conn on a fatal
      # path, reclaimed by process exit a microsecond later) doesn't apply.
      - path: ^scripts/
        linters:
          - gocritic
          - wsl_v5

formatters:
  enable:
    - gofmt
    - goimports
