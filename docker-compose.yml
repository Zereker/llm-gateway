# 本地开发 stack——只包含 gateway 跑起来需要的底层 infra：
#   - mysql       业务数据（model_services / endpoints / api_keys / pricing 等）
#   - redis       L1 cache + ratelimit bucket store
#   - redpanda    usage event Kafka 投递（billing.usage.recorded.v1）
#   - debezium    MySQL binlog → Redis Stream（gateway L1 cache 失效通路）
#
# 命令速查：
#   docker compose up -d        # 起 stack
#   docker compose down -v      # 全清（数据卷一起删）
#
# 上层进程（gateway / mockupstream）跑在宿主：
#   make run-gateway       # 启动期自跑 infra.Migrate 建表
#   make run-mockupstream  # 调试用 mock 上游（接 mockupstream 见 cmd/mockupstream）
#
# 端口映射（host → container）：
#   3306  → mysql
#   6379  → redis
#   9092  → redpanda kafka
#
# **Debezium CDC 链路**（启动 stack 后自动跑）：
#   SQL 写入 → MySQL binlog → Debezium → Redis Stream
#     `llm_gateway.llm_gateway.<table>`
#   gateway XREAD → 失效 L1 cache（实时拿到最新 endpoint / api_key / pricing）

services:

  mysql:
    image: mysql:8.0
    container_name: llm-gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: llm_gateway
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --expire-logs-days=1
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: llm-gateway-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-init:
    # 一次性：预建 billing 用的 topic（gateway outbox 投递目的地）
    image: redpandadata/redpanda:latest
    container_name: llm-gateway-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk -X brokers=redpanda:9092 topic create billing.usage.recorded.v1 -p 1 -r 1 || true
        rpk -X brokers=redpanda:9092 topic create billing.usage.recorded.v1.dlq -p 1 -r 1 || true
        echo "topics ready"
    restart: "no"

  debezium:
    image: debezium/server:2.7.3.Final
    container_name: llm-gateway-debezium
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs/debezium:/debezium/conf:ro
      - debezium-data:/debezium/data
    healthcheck:
      test: ["CMD-SHELL", "ls /debezium/data >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
  redis-data:
  redpanda-data:
  debezium-data:
