# 本地开发 stack——只包含 gateway 跑起来需要的底层 infra：
#   - mysql       业务数据（model_services / endpoints / api_keys / pricing 等）
#   - redis       ratelimit bucket store + scheduler cooldown 状态
#   - redpanda    usage event Kafka 投递（billing.usage.recorded.v1）
#
# 命令速查：
#   docker compose up -d        # 起 stack
#   docker compose down -v      # 全清（数据卷一起删）
#
# 上层进程（gateway / mockupstream）跑在宿主：
#   make run-gateway       # 启动期自跑 infra.Migrate 建表
#   make run-mockupstream  # 调试用 mock 上游（接 mockupstream 见 cmd/mockupstream）
#
# 端口映射（host → container）：
#   3306  → mysql
#   6379  → redis
#   9092  → redpanda kafka
#
# **数据新鲜度**：repo 层用 TTL 缓存（默认 30s）；deployer SQL 改完业务表
# （endpoints / api_keys / quota_policies 等）后 ~30s 内 gateway 看到新值。

services:

  mysql:
    image: mysql:8.0
    container_name: llm-gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: llm_gateway
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: llm-gateway-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-init:
    # 一次性：预建 billing 用的 topic（gateway outbox 投递目的地）
    image: redpandadata/redpanda:latest
    container_name: llm-gateway-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk -X brokers=redpanda:9092 topic create billing.usage.recorded.v1 -p 1 -r 1 || true
        rpk -X brokers=redpanda:9092 topic create billing.usage.recorded.v1.dlq -p 1 -r 1 || true
        echo "topics ready"
    restart: "no"

volumes:
  mysql-data:
  redis-data:
  redpanda-data:
